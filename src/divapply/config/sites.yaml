# Direct career site registry for DivApply - Logan / Cache Valley focus.
# California targets are commented at the bottom for a later move back.

manual_ats:
  - "ibegin.tcsapps.com"
  - "applicantpro.com"
  - "icims.com"
  - "hcahealthcare.com"

blocked:
  sites:
    - "glassdoor"
    - "google"
  url_patterns:
    - "%glassdoor%"
    - "%google.com/about/careers%"
    - "%google.jobs%"

blocked_sso:
  - "accounts.google.com"
  - "login.microsoftonline.com"
  - "okta.com"
  - "auth0.com"

base_urls:
  "GovernmentJobs.com": "https://www.governmentjobs.com"
  "SimplyHired": "https://www.simplyhired.com"
  "City of Logan": "https://loganutah.applicantpro.com"
  "Cache County": "https://cachecounty.applicantpro.com"
  "Utah State University": "https://careers-usu.icims.com"
  "Bridgerland Technical College": "https://btech.edu"
  "City of Roseville": "https://www.governmentjobs.com/careers/rosevilleca"

sites:
  - name: "GovernmentJobs.com"
    url: "https://www.governmentjobs.com/jobs?keyword={query_encoded}&location={location_encoded}&radius=15"
    type: search

  - name: "SimplyHired"
    url: "https://www.simplyhired.com/search?q={query_encoded}&l={location_encoded}"
    type: search

  - name: "City of Logan"
    url: "https://loganutah.applicantpro.com/"
    type: static

  - name: "Cache County"
    url: "https://cachecounty.applicantpro.com/"
    type: static

  - name: "Utah State University"
    url: "https://careers-usu.icims.com/jobs/search"
    type: static

  - name: "Bridgerland Technical College"
    url: "https://btech.edu/job-board/"
    type: static

  # California / Sacramento-area targets.
  - name: "City of Roseville"
    url: "https://www.governmentjobs.com/careers/rosevilleca"
    type: static

