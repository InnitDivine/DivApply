name: CI

on:
  pull_request:
  push:
    branches: ["main"]
    tags-ignore: ["v*"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,full]"

      - name: Audit Python dependencies
        run: pip-audit --progress-spinner off

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, dependency-audit]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build package
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Smoke test wheel install
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          WHEEL="$(ls dist/*.whl)"
          python -m pip install "$WHEEL"
          divapply --version
          python -m divapply --version
          divapply selfcheck
          python -m pip uninstall -y divapply
          python -m pip install "$WHEEL[full]"
          # Upstream python-jobspy 1.1.82 pins vulnerable markdownify<0.14.0.
          # DivApply installs the secure runtime floor first, then JobSpy itself
          # without transitive deps until upstream relaxes that pin.
          python -m pip install --no-deps python-jobspy
          python -c "import jobspy"
          divapply --version
          python -m divapply --version
          divapply selfcheck

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, dependency-audit]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        run: docker build -t divapply:ci .

      - name: Smoke test image
        run: |
          docker run --rm divapply:ci --version
          docker run --rm divapply:ci selfcheck
