name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release commit is on main
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,full]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify
    environment:
      name: pypi
      url: https://pypi.org/p/divapply
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Validate release version
        shell: python
        run: |
          import pathlib
          import re
          import tomllib

          tag_version = "${{ github.ref_name }}".removeprefix("v")
          pyproject_version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          init_text = pathlib.Path("src/divapply/__init__.py").read_text()
          init_version = re.search(r'__version__\s*=\s*"([^"]+)"', init_text).group(1)

          if tag_version != pyproject_version or tag_version != init_version:
              raise SystemExit(
                  f"Version mismatch: tag={tag_version}, pyproject={pyproject_version}, __init__={init_version}"
              )

          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          if f"## {tag_version}" not in changelog:
              raise SystemExit(f"CHANGELOG.md is missing a section for {tag_version}")

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Smoke test built wheel
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          WHEEL="$(ls dist/*.whl)"
          python -m pip install "$WHEEL[full]"
          python -m pip install --no-deps python-jobspy
          python -c "import jobspy"
          divapply --version
          divapply selfcheck

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
