name: Publish release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up locked Node.js runtime
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false

      - name: Validate release commit is current main tip
        run: |
          git fetch --no-tags origin main
          test "$GITHUB_SHA" = "$(git rev-parse origin/main)"

      - name: Set up locked verification toolchain
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Validate lockfile
        run: uv lock --check

      - name: Install locked dependencies
        run: uv sync --locked --extra dev --extra full

      - name: Audit locked Python dependencies
        run: uv run pip-audit

      - name: Lint
        run: uv run ruff check .

      - name: Type check Linux paths
        run: uv run mypy --platform linux src/divapply

      - name: Type check Windows paths
        run: uv run mypy --platform win32 src/divapply

      - name: Test with branch coverage
        run: uv run coverage run -m pytest -q

      - name: Enforce branch coverage
        run: uv run coverage report

      - name: Install and audit locked MCP dependencies
        working-directory: src/divapply/mcp_runtime_assets
        run: |
          npm ci --omit=dev --ignore-scripts --no-audit --no-fund
          npm audit --omit=dev --audit-level=high

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up locked build toolchain
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Validate lockfile
        run: uv lock --check

      - name: Install locked build tools
        run: uv sync --locked --extra dev

      - name: Validate release version
        shell: python
        run: |
          import pathlib
          import re
          import tomllib

          tag_version = "${{ github.ref_name }}".removeprefix("v")
          pyproject_version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          init_text = pathlib.Path("src/divapply/__init__.py").read_text()
          init_version = re.search(r'__version__\s*=\s*"([^"]+)"', init_text).group(1)

          if tag_version != pyproject_version or tag_version != init_version:
              raise SystemExit(
                  f"Version mismatch: tag={tag_version}, pyproject={pyproject_version}, __init__={init_version}"
              )

          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          if f"## {tag_version}" not in changelog:
              raise SystemExit(f"CHANGELOG.md is missing a section for {tag_version}")

      - name: Build package
        run: uv run python -m build --no-isolation

      - name: Check package metadata
        run: uv run python -m twine check dist/*

      - name: Smoke test built wheel
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          WHEEL="$(ls dist/*.whl)"
          python -m pip install "$WHEEL"
          divapply --version
          python -m divapply --version
          divapply selfcheck
          python -m pip uninstall -y divapply
          python -m pip install "$WHEEL[full]"
          # Upstream python-jobspy 1.1.82 pins vulnerable markdownify<0.14.0.
          # DivApply installs the secure runtime floor first, then JobSpy itself
          # without transitive deps until upstream relaxes that pin.
          python -m pip install --no-deps "https://files.pythonhosted.org/packages/d5/2b/18863fcd3c544a69d81e351381a50036a33c21b61cc1c6de2a8f25931237/python_jobspy-1.1.82-py3-none-any.whl#sha256=93d638b35ffd30a714253e065907f68c5bac624e3937a3ad2ba09f618a072ee9"
          python -m divapply.jobspy_runtime
          SMOKE_SITE_PACKAGES="$(python -c 'import site; print(site.getsitepackages()[0])')"
          .venv/bin/pip-audit --path "$SMOKE_SITE_PACKAGES"
          divapply --version
          python -m divapply --version
          divapply selfcheck

      - name: Assemble SBOM and checksum evidence
        run: uv run --locked python tools/build_release_evidence.py --dist-dir dist --out-dir release

      - name: Verify release evidence
        run: uv run --locked python tools/build_release_evidence.py --out-dir release --verify

      - name: Upload verified release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-bundle
          path: release/**
          if-no-files-found: error

  attest-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Download verified release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-bundle
          path: release

      - name: Attest release checksums
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: release/SHA256SUMS

  publish-pypi:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, attest-release]
    environment:
      name: pypi
      url: https://pypi.org/p/divapply
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download verified release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-bundle
          path: release

      - name: Verify release checksums
        working-directory: release
        run: sha256sum --check SHA256SUMS

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: release/packages/

  publish-github:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, attest-release, publish-pypi]
    permissions:
      contents: write

    steps:
      - name: Download verified release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-bundle
          path: release

      - name: Verify release checksums
        working-directory: release
        run: sha256sum --check SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          files: |
            release/packages/*
            release/*.cdx.json
            release/SHA256SUMS
